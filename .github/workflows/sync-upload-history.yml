name: 同步上传历史记录

on:
  push:
    branches: [main]
    paths:
      - 'sh/**'
      - 'sd/**'
      - 'wallpaper/**'
      - 'cover/**'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync-history:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 同步上传历史
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/sync-history.js
